jobs:
- job: Skia_Tests
  cancelTimeoutInMinutes: 0
  displayName: 'Runtime Tests - Skia Desktop (Release)'
  timeoutInMinutes: 60

  pool:
    vmImage: 'ubuntu-24.04'

  variables:
    NUGET_PACKAGES: $(build.sourcesdirectory)/.nuget

  steps:
  - checkout: self
    clean: true

  - template: templates/host-cleanup-linux.yml

  - template: templates/dotnet-install.yml

  - script: |
        dotnet tool install -g uno.check --add-source https://api.nuget.org/v3/index.json
        uno-check --target linux --fix --non-interactive --ci

    displayName: 'Run uno-check'

  - script: dotnet build Uno.Extensions-runtimetests.slnf /p:Build_Android=false /p:Build_iOS=false /p:Build_Windows=false /p:Build_MacCatalyst=false /p:Build_Web=false -c Release -p:GeneratePackageOnBuild=false -bl:$(Build.ArtifactStagingDirectory)/skia-runtime-test-build.binlog
    displayName: 'Build Runtime Tests app (Release)'
    workingDirectory: $(Build.SourcesDirectory)

  - task: PublishBuildArtifacts@1
    displayName: Publish Build Logs
    retryCountOnTaskFailure: 3
    condition: always()
    inputs:
      PathtoPublish: $(build.artifactstagingdirectory)/skia-runtime-test-build.binlog
      ArtifactName: skia-runtime-test-build
      ArtifactType: Container

  - script: xvfb-run --auto-servernum --server-args='-screen 0 1280x1024x24' dotnet Uno.Extensions.RuntimeTests.dll
    displayName: 'Run Runtime Tests (excluding hot-reload)'
    workingDirectory: $(Build.SourcesDirectory)/src/Uno.Extensions.RuntimeTests/Uno.Extensions.RuntimeTests/bin/Release/net10.0-desktop
    env:
      UNO_RUNTIME_TESTS_RUN_TESTS: '{"Filter": {"Value": "!Given_HotReload"}}'
      UNO_RUNTIME_TESTS_OUTPUT_PATH: '$(Common.TestResultsDirectory)/skia-runtime-tests-results.xml'

  - task: PublishTestResults@2
    displayName: 'Publish Runtime Tests Results'
    condition: always()
    retryCountOnTaskFailure: 3
    inputs:
      testRunTitle: 'Runtime Tests Run'
      testResultsFormat: 'NUnit'
      testResultsFiles: '$(Common.TestResultsDirectory)/skia-runtime-tests-results.xml'
      failTaskOnFailedTests: true
