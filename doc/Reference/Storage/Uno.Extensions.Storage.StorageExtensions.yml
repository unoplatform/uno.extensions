  assemblies:
  - Uno.Extensions.Storage
  namespace: Uno.Extensions.Storage
  summary: Reads specific lines from a file asynchronously based on the provided line ranges.
  example: []
  syntax:
    content: public static ValueTask<string> ReadLinesFromPackageFile(this IStorage storage, string filePath, IEnumerable<(int, int)> lineRanges)
    parameters:
    - id: storage
      type: Uno.Extensions.Storage.IStorage
      description: The storage interface used to access the file.
    - id: filePath
      type: System.String
      description: The path of the file to read from.
    - id: lineRanges
      type: System.Collections.Generic.IEnumerable{System.ValueTuple{System.Int32,System.Int32}}
      description: >-
        A collection of tuples representing the line ranges to extract. 

        Each tuple contains a start line (inclusive) and an end line (inclusive).
    return:
      type: System.Threading.Tasks.ValueTask{System.String}
      description: >-
        A <xref href="System.Threading.Tasks.ValueTask%601" data-throw-if-not-resolved="false"></xref> representing the asynchronous operation. 

        The result contains the extracted lines joined by the system's newline character, 

        or the entire file content if no line ranges are specified.
    content.vb: Public Shared Function ReadLinesFromPackageFile(storage As IStorage, filePath As String, lineRanges As IEnumerable(Of (Integer, Integer))) As ValueTask(Of String)
