  assemblies:
  - Uno.Extensions.Storage
  namespace: Uno.Extensions.Storage.Enumerable
  summary: Selects string typed items from the input collection based on the specified ranges.
  example: []
  syntax:
    content: public static IEnumerable<string> SelectItemsByRanges(this IEnumerable<string> source, IEnumerable<(int Start, int End)> ranges)
    parameters:
    - id: source
      type: System.Collections.Generic.IEnumerable{System.String}
      description: The collection of string typed items to select from.
    - id: ranges
      type: System.Collections.Generic.IEnumerable{System.ValueTuple{System.Int32,System.Int32}}
      description: >-
        A collection of ranges, where each range is a tuple containing a start and end index.

        The start index specifies the first item to include, and the end index specifies the last item to include.
    return:
      type: System.Collections.Generic.IEnumerable{System.String}
      description: >-
        An enumerable collection of strings, where each string represents the items within a specified range.

        If a range is invalid (e.g. start is greater than the last one), an empty string is returned for that range.
    content.vb: Public Shared Function SelectItemsByRanges(source As IEnumerable(Of String), ranges As IEnumerable(Of (Start As Integer, [End] As Integer))) As IEnumerable(Of String)
