  namespace: Uno.Extensions.Storage.Enumerable
  summary: Retrieves the concatenated items within the specified range as one single <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/reference-types">string</a> joined by <xref href="System.Environment.NewLine" data-throw-if-not-resolved="false"></xref> character.
  example: []
  syntax:
    content: public static string GetItemsWithinRange(this IEnumerable<string> source, (int Start, int End) range)
    parameters:
    - id: source
      type: System.Collections.Generic.IEnumerable{System.String}
      description: The <xref href="System.Collections.Generic.IEnumerable%601" data-throw-if-not-resolved="false"></xref> to select from.
    - id: range
      type: System.ValueTuple{System.Int32,System.Int32}
      description: >-
        A tuple containing the start and end indices of the range as <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/integral-numeric-types">int</a>.

        The start index specifies the first item to include, and the end index specifies the last item to include.
    return:
      type: System.String
      description: A string containing the string typed items of <code class="paramref">source</code> within the specified range, joined by the system's newline character.
    content.vb: Public Shared Function GetItemsWithinRange(source As IEnumerable(Of String), range As (Start As Integer, [End] As Integer)) As String
